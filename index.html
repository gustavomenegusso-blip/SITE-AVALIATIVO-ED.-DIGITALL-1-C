<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual do Craque | Info & Regras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="a11y-toolbar" aria-label="Ferramentas de Acessibilidade">
        <button onclick="updateFont('plus')" aria-label="Aumentar texto">A+</button>
        <button onclick="updateFont('minus')" aria-label="Diminuir texto">A-</button>
        <button id="theme-toggle" aria-label="Alternar Contraste">🌓 Alto Contraste</button>
    </nav>

    <header class="hero-header">
        <div class="logo">ARENA<span>INFO</span></div>
        <p>O guia visual definitivo sobre as medidas e regras do futebol.</p>
    </header>

    <main>
        <section id="comic-info" class="reveal">
            <h2 class="title-main">A Ciência do Campo (HQ)</h2>
            <div id="hq-grid" class="comic-container">
                </div>
        </section>

        <section id="regra-detalhada" class="reveal">
            <h2 class="title-main">O Livro de Regras</h2>
            <div id="rules-accordion" class="accordion">
                </div>
        </section>

        <section id="curiosidades" class="reveal">
            <h2 class="title-main">Curiosidades de Placar</h2>
            <div class="carousel">
                <div id="carousel-track" class="track"></div>
                <div class="nav-btns">
                    <button id="prev">⬅</button>
                    <button id="next">➡</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Conteúdo técnico baseado nas normas da IFAB/FIFA.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
